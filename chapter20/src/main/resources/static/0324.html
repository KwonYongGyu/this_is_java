<!DOCTYPE html>
<html>
<head>
  <meta lang="ko" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>유저 정보</title>
  <link rel="stylesheet" href="./css/0324.css" />
</head>
<body>
<header>
  <h1>유저 정보</h1>
</header>
<main>
  <section id="inputSection">
    <fieldset class="inputField">
      <legend>정보 입력</legend>
      <div class="inputItem">
        <div class="text-wrapper">이름</div>
        <div class="div">
          <input type="hidden" id="id" value="0"/>
          <input type="text" id="name" class="inputText" maxlength="30" placeholder="이름을 입력하세요"/>
        </div>
      </div>
      <div class="inputItem">
        <div class="text-wrapper">비밀번호</div>
        <div class="div">
          <input type="password" id="password" class="inputText" maxlength="50" placeholder="비밀번호 입력"/>
        </div>
      </div>
      <div class="inputItem">
        <div class="text-wrapper">나이</div>
        <div class="div">
          <input type="number" id="age" class="inputNumber" min="0" max="150" value="0"/>
        </div>
      </div>
      <div class="inputItem">
        <div class="text-wrapper">이메일</div>
        <div class="div">
          <input type="email" id="email" class="inputText" maxlength="50" placeholder="example@mail.com"/>
        </div>
      </div>

      <div class="inputImage">
        <img
                id="showImage"
                src="https://pimg.mk.co.kr/news/cms/202504/06/news-p.v1.20250404.ad221f845db2489a86c2ff50f32c53fa_P1.png"
                alt="사용자 이미지"
        />
      </div>
      <div class="inputButtons">
        <div class="btn-wrapper">
          <button class="btn" id="btnAdd">추가</button>
        </div>
        <div class="btn-wrapper">
          <button class="btn" id="btnUpt">수정</button>
        </div>
        <div class="btn-wrapper">
          <button class="btn" id="btnDel">삭제</button>
        </div>
      </div>
    </fieldset>
  </section>

  <section id="listSection">
    <fieldset class="listField">
      <legend>유저 목록</legend>
      <div class="listTitleRow">
        <div class="listItem">
          <div class="itemTitle text-wrapper">이름</div>
        </div>
        <div class="listItem">
          <div class="itemTitle text-wrapper">나이</div>
        </div>
        <div class="listItem">
          <div class="itemTitle text-wrapper">이메일</div>
        </div>
      </div>
      <div class="listDataBlock">
      </div>
    </fieldset>
  </section>
</main>
<footer>
  <div>made 2026-03-24</div>
</footer>
</body>
</html>
<script src="./js/jquery.min.js"></script>
<script src="./js/0324.js"></script>
